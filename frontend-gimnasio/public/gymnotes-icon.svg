<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo azul con degradado suave -->
  <defs>
    <linearGradient id="gn-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00e0ff"></stop>
      <stop offset="100%" stop-color="#007bff"></stop>
    </linearGradient>
  </defs>

  <!-- Cuadrado redondeado de fondo -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#gn-grad)"></rect>

  <!-- Texto GN centrado -->
  <text x="32" y="32" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="bold" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    GN
  </text>

  <!-- Subrayado debajo del texto -->
  <line x1="20" y1="36" x2="44" y2="36" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"></line>
</svg>
