<h2>Entrenar hoy 💪</h2>

<!-- Barra de filtros -->
<div class="toolbar">
  <input type="text" class="auto-input" placeholder="Buscar ejercicio..." [(ngModel)]="q" (ngModelChange)="filtrar()" [matAutocomplete]="auto">

  <mat-autocomplete #auto="matAutocomplete" (optionSelected)="seleccionar($event.option.value)">
    <mat-option *ngFor="let e of opciones" [value]="e.nombre">{{ e.nombre }}</mat-option>
  </mat-autocomplete>

  <select [(ngModel)]="grupoSel" (ngModelChange)="filtrar()">
    <option value="">-- Todos los grupos --</option>
    <option *ngFor="let g of grupos" [value]="g">{{ g }}</option>
  </select>

  <button class="btn clean" type="button" (click)="limpiarFiltros()">Limpiar</button>
</div>

<!-- Añadir series -->
<div class="toolbar">
  <label for="peso"><small>Peso:</small></label>
  <input id="peso" class="input" type="number" [(ngModel)]="peso" min="0" step="2.5" (keydown.enter)="add()">

  <label for="reps"><small>Repeticiones:</small></label>
  <input id="reps" class="input" type="number" [(ngModel)]="reps" min="1" (keydown.enter)="add()">

  <button (click)="add()" [disabled]="!ejercicioId || reps < 1 || peso < 0">Añadir serie</button>
</div>

<hr>

<!-- Listado de series agrupado por ejercicio -->
<ng-container *ngIf="gruposSeries.length; else vacio">
  <div class="grid">
    <div class="card" *ngFor="let g of gruposSeries">
      <h3>{{ g.nombre || ('Ejercicio ' + g.ejercicioId) }}</h3>
      <ul>
        <li *ngFor="let s of g.series; let i = index">
          {{ s.peso }} kg × {{ s.repeticiones }} reps
          <button type="button" class="remove" (click)="borrarSerie(s)">
            ❌
          </button>
        </li>
      </ul>
    </div>
  </div>
</ng-container>

<ng-template #vacio>
  <p>No hay series todavía. A entrenar 🔝</p>
</ng-template>
