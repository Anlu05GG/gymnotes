<h2>Mis rutinas</h2>

<!-- Escribir nombre de nueva rutina -->
<div class="toolbar">
  <input type="text" [(ngModel)]="nombreNueva" (keydown.enter)="crear()" placeholder="Nombre de la rutina" />
  <button class="btn" (click)="crear()" [disabled]="!nombreNueva.trim() || existeRutinaConNombre(nombreNueva)">
    Crear
  </button>
</div>

<p class="error" *ngIf="nombreNueva.trim() && existeRutinaConNombre(nombreNueva)">
  Ya tienes una rutina con ese nombre
</p>

<hr />

<!-- Listado de rutinas del usuario -->
<ul *ngIf="rutinas.length; else vacio">
  <li *ngFor="let r of rutinas">
    <strong>{{ r.nombre }}</strong>
    <small>creada {{ r.fechaCreacion }}</small>
    <span class="btns">
      <button class="smallBtn" (click)="ver(r)">Ver</button>
      <button class="smallBtn remove" (click)="borrar(r)">Borrar</button>
    </span>
  </li>
</ul>

<ng-template #vacio>
  <p>No tienes rutinas aún.</p>
</ng-template>
