<h2>Ejercicios de la rutina</h2>
<div *ngIf="error">{{ error }}</div>

<div class="toolbar">
  <input type="text" [(ngModel)]="q" (ngModelChange)="filtrar()" placeholder="Buscar ejercicio...">
  <select [(ngModel)]="grupoSel" (ngModelChange)="filtrar()">
    <option value="">-- Todos los grupos --</option>
    <option *ngFor="let g of grupos" [value]="g">{{ g }}</option>
  </select>
  <button class="btn clean" (click)="limpiarFiltros()">Limpiar</button>
</div>

<div class="toolbar">
  <select [(ngModel)]="ejercicioId">
    <option [ngValue]="null">-- Selecciona ejercicio --</option>
    <option *ngFor="let e of opciones" [ngValue]="e.id">
      {{ e.nombre }} ({{ e.grupoMuscular }})
    </option>
  </select>
  <input type="number" [(ngModel)]="series" min="1"> series
  <input type="number" [(ngModel)]="reps" min="1"> reps
  <button class="btn" (click)="add()" [disabled]="!ejercicioId || series < 1 || reps < 1">Añadir</button>
  <button class="btn back" (click)="volver()">Volver</button>
</div>

<hr>

<ul *ngIf="items.length; else vacio">
  <li *ngFor="let it of items">
    <strong>#{{ it.orden }}</strong>
    - {{ it.ejercicioNombre || ('Ejercicio ' + it.ejercicioId) }}
    - {{ it.seriesObjetivo }}x{{ it.repeticionesObjetivo }}
    <button class="remove" type="button" (click)="quitar(it)">Quitar</button>
  </li>
</ul>

<ng-template #vacio>
  <p>Esta rutina aún no tiene ejercicios.</p>
</ng-template>
